<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marhaban ya Ramadan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-mosque me-2 text-warning"></i>Ramadan Kareem
            </a>
        </div>
    </nav>

    <div class="container-fluid bg-success bg-gradient text-white text-center min-vh-100 d-flex flex-column justify-content-center align-items-center position-relative">
        
        <i class="fas fa-moon text-warning display-1 mb-4 shadow-sm rounded-circle"></i>
        <h1 class="display-3 fw-bold mb-3">Marhaban ya Ramadan</h1>
        <p class="lead mb-5 fs-4 w-75 mx-auto">Bulan penuh berkah, rahmat, dan ampunan telah tiba. Mari sucikan hati dan tingkatkan ibadah kita.</p>
        
        <button type="button" class="btn btn-warning btn-lg rounded-pill px-5 py-3 fs-4 fw-bold shadow-lg" data-bs-toggle="modal" data-bs-target="#thrModal">
            <i class="fas fa-envelope-open-text me-2"></i> Buka Kejutan THR!
        </button>
        
    </div>

    <div class="modal fade" id="thrModal" tabindex="-1" aria-labelledby="thrModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center border-0 shadow-lg rounded-4">
                
                <div class="modal-header border-0 bg-warning bg-gradient text-dark justify-content-center position-relative rounded-top-4 py-4">
                    <h4 class="modal-title fw-bold" id="thrModalLabel">🎉 Alhamdulillah! 🎉</h4>
                    <button type="button" class="btn-close position-absolute end-0 me-3" data-bs-dismiss="modal" aria-label="Tutup"></button>
                </div>
                
                <div class="modal-body p-5 bg-white">
                    <img src="meme prabowo.jfif" class="img-fluid rounded-3 mb-1" alt="THR">
                    <h2 class="fw-bold text-success mb-3">Selamat!</h2>
                    <p class="fs-5 text-secondary">Anda mendapatkan THR spesial hari ini.</p>
                    
                    <div class="card bg-success bg-gradient text-white border-0 shadow-sm mt-4 mb-3 rounded-4">
                        <div class="card-body py-4">
                            <h3 class="fw-bold mb-0">19 Juta</h3>
                        </div>
                    </div>
                    
                    <p class="text-muted small"><em>*(Semoga rezeki materinya juga dilancarkan selama bulan puasa ini ya!)*</em></p>
                </div>
                
                <div class="modal-footer border-0 justify-content-center bg-light rounded-bottom-4 pb-4">
                    <button type="button" class="btn btn-success btn-lg rounded-pill px-5 shadow-sm" data-bs-dismiss="modal">
                        <i class="fas fa-hands-praying me-2"></i>Amin, Terima Kasih!
                    </button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
